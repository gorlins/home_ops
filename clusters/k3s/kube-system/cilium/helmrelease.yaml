---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  url: oci://quay.io/cilium/charts/cilium
  ref:
    tag: 1.19.3
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: cilium
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    kubeProxyReplacement: true
    k8sServiceHost: localhost
    k8sServicePort: 6443
    ipam:
      operator:
        clusterPoolIPV4PodCIDRList: "10.42.0.0/16"

