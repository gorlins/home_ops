apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: ak-outpost-ldap
spec:
  entryPoints:
    - ldap
  routes:
  - match: HostSNI(`*`)  # Apparently can't detect hosts on TCP w/o TLS
    services:
    - name: ak-outpost-ldap
      port: ldap
      # Here, nativeLB instructs to build the servers load balancer with the Kubernetes Service clusterIP only.
      nativeLB: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: ak-outpost-ldaps
spec:
  entryPoints:
    - ldaps
  routes:
  - match: HostSNI(`ldap.${SECRET_DOMAIN}`)
    services:
    - name: ak-outpost-ldap
      port: ldap # TLS handled by ingress, point to insecure in the back
      nativeLB: true
  tls:
    certResolver: le
    domains:
    - main: ldap.${SECRET_DOMAIN}
