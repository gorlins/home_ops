apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: ak-outpost-ldap
spec:
  entryPoints:
    - ldap
  routes:
  - match: HostSNI(`*`)  # Apparently can't detect hosts on TCP w/o TLS
    services:
    - name: ak-outpost-ldap
      port: 389

---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: ak-outpost-ldaps
spec:
  entryPoints:
    - ldaps
  routes:
  - match: HostSNI(`ldap.${SECRET_DOMAIN}`)
    services:
    - name: ak-outpost-ldap  # Handle termination here instead of backend
      port: 389
  tls:
    certResolver: le
    domains:
    - main: ldap.${SECRET_DOMAIN}
