---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rook-ceph-cluster
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: *app
      version: 1.19.3
      sourceRef:
        kind: HelmRepository
        name: rook-release
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    clusterName: rook-ceph

    monitoring:
      enabled: true
      createPrometheusRules: true

    toolbox:
      enabled: true

    route:
      dashboard:
        host:
          name: "rook.${SECRET_DOMAIN}"
          path: /
          pathType: PathPrefix
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https

    cephClusterSpec:
      network:
        provider: host
        addressRanges:
          public:
            - "10.8.8.0/24"
          cluster:
            - "10.10.11.0/24"

      dashboard:
        enabled: true
        urlPrefix: /
        port: 7000
        ssl: false
        prometheusEndpoint: http://prometheus-operated.observability.svc.cluster.local:9090
        prometheusEndpointSSLVerify: false
#        settings:
#          grafana-api-url: http://grafana.observability.svc.cluster.local:80
#          grafana-api-ssl-verify: false

      mgr:
        modules:
          - name: diskprediction_local
            enabled: true
          - name: telemetry
            enabled: true
          - name: insights
            enabled: true
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true

      storage:
        useAllNodes: true
        useAllDevices: false
        # Only create OSDs on devices that match the regular expression filter, "sdb" in this example
        deviceFilter: nvme
