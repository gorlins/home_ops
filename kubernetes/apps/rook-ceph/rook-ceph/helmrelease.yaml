---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rook-ceph
spec:
  interval: 1h
  chart:
    spec:
      chart: rook-ceph
      version: 1.19.3
      sourceRef:
        kind: HelmRepository
        name: rook-release
  values:
    enableDiscoveryDaemon: true
    monitoring:
      enabled: true
