apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshots
spec:
  cron: "40 6 * * *"
  task: "snapshot"
  groups:
  - default
  retain: 30
  concurrency: 1
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-system-backup
spec:
  task: system-backup
  cron: '45 7 * * SAT'
  retain: 12
  concurrency: 1
  parameters:
    volume-backup-policy: if-not-present
