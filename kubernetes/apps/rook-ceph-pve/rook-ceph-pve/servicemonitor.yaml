apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rook-ceph-mgr-external
  labels:
    # Match the Prometheus Operator's serviceMonitorSelector label
    release: kube-prometheus-stack
spec:
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - rook-ceph-pve
  selector:
    matchLabels:
      app: rook-ceph-mgr
      rook_cluster: rook-ceph-pve
