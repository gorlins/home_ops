---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rook-ceph-pve
  namespace: &namespace rook-ceph-pve
spec:
  interval: 1h
  chart:
    spec:
      chart: rook-ceph-cluster
      sourceRef:
        kind: HelmRepository
        name: rook-release
        namespace: rook-ceph
  values:
    operatorNamespace: rook-ceph
    # All values below are taken from the CephCluster CRD
    # -- Cluster configuration.
    # @default -- See [below](#ceph-cluster-spec)
    cephClusterSpec:
      external:
        enable: true
      cephVersion:
        image: quay.io/ceph/ceph:v19  # Match with proxmox
      dataDirHostPath: /var/lib/rook/pve
      crashCollector:
        disable: true
      monitoring:
        enabled: true
        externalMgrPrometheusPort: 9283
      healthCheck:
        daemonHealth:
          mon:
            disabled: false
            interval: 45s

    # Pools are not needed - they are created and/or referenced by the import script
    cephBlockPools: {}
    cephFileSystems: {}
    cephObjectStores: {}

